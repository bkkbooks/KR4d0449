body:
  text: 湛淵集元白珽撰西湖賦杭之有西湖不獨如人之有眉目也如楚有金如蜀有錦人得貴而玩之也凡水在天地間由山而出由地而受為里合萬有六千奚止此水可誇絶於天地哉顧一州一縣理所在水之東者皆西湖也潁有之松有之山陽四明類有之獨在杭者齒響諸夏而筆騁羣彥是蓋有明珠玊樹不待斫而成大圭圓璧不待繅而貴者矣是湖也發源南北之諸峯而風氣曼延乎東州之列岫近而秦望逺而桐扣左龍飛之兩乳右鳳凰之孤咮勢將合五州之芳澤集萬山之鮮溜豈惟武林之一泉武林即靈隱山也俗稱錢塘門裏太乙宮小阜非能專此江北江南之秀原夫竒狀天造勝境一作麗景人為古稱圖畫之如則陋今曰蓬萊之山亦非若欲知三歎望洋之盛當不憚登一覽衆小之危悵天地之尤物何簡牒之偶遺於鄴侯之六井獲肇見於唐碑蕩海濱一作瀕之瀉鹵弭疾厲於羣黎今衍之而為井十或通貫乎園池繼崇隄而節水將下塘而注陂羌運漕而達河亦溉旱而涵瀰澤及田疇之廣乃繼聞於太傅之記辭錢氏置千兵而設撩陳氏述古資衆僧而繕治既大備於蘇公樹三塔於中流橫六橋於長隄復繼志於趙侯與音籌擴波光於板目續麯院之一支亭館日增而月益崇築前規而後隨此特表其人為之序乃以見夫天造之機南北兩峯亦有祠宇譬之龜蒙為望於魯皇妃保叔雙擎窣堵截羣峯之駿奔為西湖之門户冠之以南屏襟之以赤土宮其湄以致齊圃其墟而閲武煙霞乍舉白雲不去金鐘無聲玊岑有數鴉雞延為向背靈鷲衍為胥附五峯飛來白猿蓮花稽留月桂指列乎虎林三竺駢羅乎玊女按駝巘而巾子巍如帶束一作粟山而石甑酷似在水中央孤立一嶼遼鶴不來處士誰與幸庾梅之猶昨惜陳柏之非古由四剎報恩智果廣化瑪瑙負鰲而徙成太一祝釐之所復有寶蓮瑞石逺映胥山之輔金地七寶南屏至此皆敘繞湖山名翠瓦丹柱寫影乎水滸凡此前後聯絡復多嶺塢葛公巳往而丹井不改仙姥既去而慈雲如故二麥當風篁之衝胭脂割黃泥之據萬松東接乎宮垣棲霞南沿乎嶽墓紫坊鐵冶石人大青之儔散不計其在處中有水竹青芝法華大悲桃花瑞岡之相背巢溝龍駒之並馳詠吳王之楓木表金嫗之楊梅抑不過因人煙之所聚曽不若朱野葛塢之得人而竒洞則有龍泓香林水樂石屋呼理公之白猿避里人之蒼蝠煙霞後即蝙蝠洞乾濕二洞在栖霞嶺往往刓巖而嵌谷雖形勢之或殊皆所以發湖光而增山渌泉石井潭澗谷實繁釐為十八合為一源濯惠因之滄浪㺯金沙之潺湲冷可洗耳甘可滌煩旁城有甘泉坊禱白鱔而祠烏龍記水魚龍井而碑靈鰻限玊為池跳珠為軒香山六一參寥東遷各井其井各泉其泉終歸于一作乎一萬頃之湖天若也一作夫園池樓觀佛宮仙宇辨口不能殫其名巧厯不能知其數余固拙於言辭始槩陳其泄露尚慮齊人不知有稷下徂丘徒知有管仲晏子湖詠維百先言御園爰有聚景圖經所尊致坤宮之孝養據震位以生蕃來四朝之游幸攬衆逺以平吞攬逺堂名南有翠芳蘭栧在焉御舟名接蓬萊於中沚甘園有水中蓬萊堂賓慧日於前軒北有玊壺紅鵑尚存創於鄜王𨽻於慈元去環碧兮百櫂隔水月兮一垣慶樂有梅關桂林之勝珍鳥異獸之繁內畜天鵝牯牛𤣥鹿三尾龜等亭連棟為十錦碑蝕一作角苔以千言記南園之絶景扁西湖之洞天此皆始屬於禁籞又不但嘗錫之侯藩次則仰真珠之髙寒聽水樂之聲在髙寒聲在皆園中堂名雲洞居下湖之左古栁列昭慶之外得萬景之天全攬一作擅九曲之紫翠萬景天全堂名前有紫翠間亭總宜盡晴雨之竒養樂集雕鎪之藝廖氏九經等書鏤板其中梅岡班衣擇勝秀野藹梅坡之緑隂逆一作通花家之紅靄尚名苑與勝圃滋角竒而鬭異矗不知其幾百十所所可言者特言其最堂則有德生溥泳飛之仁依光覺貪濁之迷偉觀興頑懦之志湖山廣夀樂之基三賢先賢序列一隄表義夫節婦三十九人之樂石儼大人君子千載一心之令儀閎雪江之講肆湖侊講堂在新路褰氷壑之書帷金淵書堂在南山下隱居思真玉蓮舊名一清翠樾九師者美尚可按跡於品題亭稱冷泉旁連壑雷上有天香下有客兒花光巧於公輸通𤣥掩於招提春雨為觀香月為鄰水竹院落無邊風月見天地心以總之皆賈氏亭館名池有湧金金牛白龜瑶池白洋分占湖之四涯林塘之鑿花徑之構各擇其地各揭其楣非窺園則莫知禮重崇報有國所祠夏禹據城隍之堞神胥峙輦道之陴旌金祝之奮忠慨朱蹕之蹈危皆湖上捍禦金兵死節者嘶府君之神馬游宰相之白衣海州死節張玘鄂國錫圭傳唄林於霍山之阜薦菊泉於嘉澤之墀維廟食於百世皆功德搜於祀典一作祝司非若倚草附木徒禍福於六時陵墓則有后妃𦙍嗣之攢宮侯王君公之塋碑朱少章之節旄已落馬三寶之壺蜂不飛和靖贊寧花翁紫芝孫惟信趙師秀皆炳乎山靈水秀一作婓之濳輝惟塔闕教也太乙奠福曜之臨闕䖍先哲之闕四聖顯應報隂相於中興三茅表忠見闡靈於內向安晚峙玉一作上清之下初陽臺玉清之上雲濤靈曜崇真希夷明真神仙雖藏幽占爽隱顯於一作乎此湖要不若佛寺蘭若後先乎重山復水之廣松門九里袁公是崇仁敬七峯兩澗靈隱其中秀石竒木靈泉怪峯兼幽人禪衲之盛將互見於纍代能言之巨公揵竺有三連甍接墉觀自下而中而上始王囿而臻大士之宮神檜重榮御梅猶紅草堂繞枕流之翠香林挂古藤之虹禮寶掌而登天巖瞻珠鬘而下乳峯前生仙而廣利普福寺後月桂而洪鐘集慶寺圓覺藏思陵之扆靈芝抱越王之弓遡雲扉之幽窈顯慶寺撫靈石之玲瓏演福寺現長耳之妙相演句麗之慈風南屏列家人之象瑞龍豁竒觀之胸五百應真萬鈞巨釜畫廊絢日鐵塔插空惟净慈為南山衆剎之宗瑪瑙而坡鳥窠而叢佛三寸不為小樓十三以龕其像佛百丈不為大舟萬斛以維之蹤借竹智光掃缶中庸惟夀星為北嶺叢林之雄豈唐朝四百八十猶有存者而宋興幾三百載損益其中樓閣則豐樂中峙據湖之㑹叢以亭榭附以闤闠魚莊曼衍栁洲縈帶竹山城而可眺迎光張循王園樓雲而不礙清曠專負山之美南屏山下先得俯近山一作水之快即蘇公望湖樓紅梅閣於孫沔緑竹閣於居易巢居瘞杖於屏下四照插峯于鏡外二閣在孤山上外如延賓望海蓬萊雲漢正遍海㑹顧層見迭出之多而半為白鶴青鸞之所蔽皆在道宫佛寺中也復有如虹者六御筆仰題西泠處士宛武揚鬐斷橋非荒蘚之舊長橋有古木之依琮老金佛二橋在天竺前節奔泉之所發行春合澗條衆壑之攸歸餘則凌金跨玉斜斜整整將舉趾而皆迷其或男裙女袿東游西泛畫舫蘭舟輕舠巨艦各標令名明渌清泛金勝小而善疾寶瓶大而宜緩明玉坐百客而有裕總勝列四筵而才半賞心泛渌百花望月皺緑翻篙流蘇颭幔坐若室處行若物換值御舟之游幸從水嬉之宣喚前金吾而不禁後天香之拂靣鱗如翼如恍衆星拱辰於天河之畔非萬斛之能擬豈千丈之為算史記船長千丈謂積數也别有龍舟兩兩鼉鼓馮馮花帽表於御愛繡袍見於神歆陳百戲於水面豎六標於湖心一作濱參前兩後三令五申觀者舟兩行如廣陌迓者錦萬竿如長林五步一亭酒斾茶裀笙歌沸騰軒鞅紛紜栁行撲地花陳排雲梭門秋千出沒乎翠圍舞衣歌扇周旋乎香塵新路習金雞之跖郊祀大禮嵗則御前百戲預于南新路習肆赦之藝祠山迎寶馬之羣二月八日迎七寶社馬社祭于霍山張祠觀者甚盛目不暇瞬步不得循想見進魚羮之宋嫂猶多呈鶴舞之優人翦羅飣採花之藍範飴為穿栁之鱗飾木兵於小桁串家具於修筠篙矢激半空之霹靂紙鳶競九天之經綸柘彈象弩畫棍髹盆踏混才潑巨盆皆水戲羅襪凌波金叉照春時固多攬紅拾翠之子亦豈無尋幽討勝之賓此特言萬一於春九十之辰薰風動絃清和云始粲裏湖之梔林拂夾塘之荷翠紫燕瞥過白鷗乍起早崔祠之𥘉度磁州府君六月六日誕辰都人于顯慶觀燒香已集湖中為避暑飲正盾日之方熾水鏡濯髮謂善泅者氷山厲齒移舟南向㩦衾夜䂀無人世之熱惱有月宮之寒意豔麗見於水如見於仙醲一作釀鮮取諸舟如取諸市秋容不淡拒霜已紅映後開之菡萏雜戰水之游龍剖霜柑於驄轡簪露菊於船篷西山賦紅葉之句南山釂紫茰之鍾北風戒寒城人簡出肉輦酒船亦無虛日延祥之紅白梅城吳阜之髙低雪域寶騎躍長隄而蹴瓊瑶幔車穿名園而擲珠瓅是蓋四時之景不同亦各以見賞心樂事之不一爾乃既聞遨娛之盛請言風土之美水憑山而甘潔土得湖而豐泥菘葍取種於苕霅蓮芡移根於檇李紫芋青菰白藕紅芰文鳬章鸝黃雀錦雉魚甜蟹香筍鮮芹脆松杉檜柏參术蘭芷實鍾此湖山之秀故無物而不備矧佳氣之磅礴至人材而尤異所謂傭兒販婦涵氷玉之不翅况彼都人士褚陶晉人十三嵗作賦才德為張華所稱杜栖南齊人篤孝為學士之文行全琮吳人父令賫米數千斛皆以振飢貧者以功為大司馬許逺之忠義元綘唐肅皆宋人有功德及物廣恩惠於民人伯玉姓禇南齊人隱瀑布山纍召不至君復抱孤貞於林翳禇氏世濟其美於大唐錢氏開國承家於五季顧歡郎蘭之豈弟宋齊間人以學術濟人者由聞道而為羅隱楊蟠之峻烈豈工詩而已矣惟此人物之盛不可殫紀方外則郭文王復馬湘潘閬管歸真之流以發揮其英聲法照贊寧道潛清順抱一子之徒以陶寫其清氣時人但知游觀之可樂而不知景物緣人之可貴且自有天地即有此湖羣峯注流底而成瀦尚念東漸於海鹹惡所濡草木齧餘而色變山川薄久而氣殂所以消沮沈昧之不已雖有此湖而如無於是築而防之使涇渭各得其所浚而闢之俾鳶魚各遂其初風無大浪雨無奔湍將翺將翔以佃以漁以此知古人有功於此水將舉一朝而利萬世以無餘何闕寶正以還六龍南渡搜勝抉竒重丹疊素致洞心駭目之觀非晴光雨色之故彼徒知嵗增侈而月益奢至以釜銷金之為喻殊不知神京不返憂勤聖寧千官展轉而擇棲萬姓倣徨而懷土故思極耳目之娛而為安旦夕之具不然中原豈無黃河泰山之雄觀花石艮嶽之竒趣日月云邁裴􅏆瞻顧嗟居人游女不能不極盤游無度之歡而志士仁人不能不興宴安鴆毒之慮咸淳庚午嵗作游後湖賦按此賦又載方回桐江續集三月草又三日張鵬飛及方萬里李和之白廷玉泛湖值雨各賦詩一首萬里曰隄栁春濃萬緑垂開懷消得好風吹絶憐白也詩無敵共賞坡仙雨亦竒興欲狂時呼酒急境當佳處任船遲豈無顧陸丹青手畫與人間後世知余戲作小賦云栁絮化萍濃緑藏鶯不見其處止聞其聲此豈非春工之極致歟湛然宴坐輕舟自行萬姿千態逺山縱橫透䟱簾而濕衣忽驟雨之若傾甫下矴而閉户才頃刻而復晴白子酒稍酣矣奮髯而慷慨曰此何為者邪撫流光之倏忽悟慘舒之不常於是誦趙抃表忠之奏歌蘇仙薦菊之章彼割據於五季若錢氏之數王渺丘壟之無迹愴松楸其可傷涸銀海而出金碗穴狐兔而上牛羊豈不亦雄傑一時兮終若雍門之泣孟嘗賦梅處士妙解影香骨可以腐千古不忘鬱孤山其硉兀擁萬樹之青蒼罔蔗節之遺恨保故封猶若堂天道茫茫一雨一暘榮悴隆替柔剛微彰謂偶然不足芥蒂兮曰作善降之百祥謂理有必可恃兮曷顔夭而跖長二客方李遨頭目張嗔無故而多事掇陳迹而揣量指金叵羅其猶淺兮舉大白而浮一作罰之觴白子曰不然老隂為六老陽為九老則必變如屈伸肘惟知變者可與長久知六之變固乃可守知九之變健不為首顧此湖中之舟與舟中之人寧常夀而不朽能畏謹以自修庶吉亨而無咎幸乘時而過分負且乘兮致寇環綽約之蛾眉佩金印而如斗管絃沸其前後紫緋奔其左右一旦不能自保率同歸於石友蠢苗竄於三危防風積一作橫於九畝曾不見或裸體以罩魚或跣足而踏藕侔帶索之榮公甚泥塗之綘叟立層氷而弗寒茹野堇其適口無樂亦復無憂不自知其不偶豈不勝於夢晉而疾顛者乎此莊子所以不為廟犧而李斯所以憶上蔡之狗也舟且抵岸悉闢其牖賦詩各成肴核再取有化而無無化而有雨晴晴雨紛糅結糾斯時也度夕陽猶未至於酉多言數窮姑相與大笑盡樽中之酒吳季子墓聖人如日月下照無黨私藏珠與韞玉所得自華滋恭惟吳季子夙稟明睿姿近取子臧節逺紹泰伯基兩以大國讓亷風起蠻夷觀樂義已燭挂劍心如飴時方尚詐力子獨恪且祗時方事冦攘子獨甘棄遺孔子不到吳聞風重齎咨佳城介申浦采地亦在兹特書寄餘哀豈不遐邇思惋惋龍蛇翥皎皎星日垂禹世懷道義取舍實擊之寄言邦之人無但峴首悲題斬蛟橋桓桓周將軍英烈照千祀少年知自艾成人一作仁不惜死射虎南山下斫潛北橋底騰拏三日夜灑血四十里激波為嶽立揮刃電亦駛想當批鱗初見義不見水及其立人朝矯矯中不倚文學既英發武事復霆起殱兒善醜正甘作忠義鬼至今有生氣耿耿耀青史蘇公百世豪氣味有相似泊舟蛟川下洗石題所以平生疾惡意十有二言裏豐碑刻祠宇詞翰晉二美二美固足珍吾取不在是同陳太博諸公登六和塔龍山古化城浮屠峙其巔開殿生妙香金碧森貝筵應真儼若生倒飛青金蓮頭陀紺林叢導我丹梯緣初猶藉佛日閟境鯈已𤣥回頭失誰何呌嘯衣相牽且復忍須㬰當見快意天嬌兒詫先登網户相鉤連炯若蟻在珠九曲隨盤旋爛爛滄海開落落雲氣懸羣峯可俯拾背閲黃鵠騫竒觀興懦夫便欲凌飛仙絶頂按坤維始見南紀偏神京渺何許王氣須停一作停須躔舟車集百蠻島嶼通人烟一為帝王州氣壓三大千罡風灑毛髮鐸語空蟬聯紅紅杏園花愧乏慈恩篇冷泉亭靈山本清净一泉渟其中靈山孤飛來此水將無同山影壓不盡照見天玲瓏分明千尺氷不獨疑寒蟲京洛多風塵到此一洗空炎寒無二心凛有操者風泊然守空梵萬劫豈一作無終窮驪山有溫泉虛一作曾築華清宮題松雪臨郭河陽溪山漁樂圖逺山近山何歷歷下有長溪橫一碧溪中亦有釣鰲手此手不遮長安目野橋烟樹接草廬飛流如練懸空虛截山白雲凝不去要人寫作巖居圖河南婦按輟耕録婦世為河南民家元兵下江南婦被掠姑與夫行求數年得之河南婦已嫁千户某饒於財情好甚洽視夫姑若塗人㑹有㫖凡婦人被掠許銀贖敢匿者死某懼罪急遣婦婦堅不行夫姑留以俟婦閉其室弗與通遂號慟頓絶而去行未百步青天無雲而雷回視婦已震死從軍古云樂獲罪禱應難母望明珠復夫求破鏡完押衙逢義士公主奉春官為報河南婦天刑不可干春日田園雜興月泉吟社第十八名唐楚友即湛淵先生也雨後散幽步村村社鼓鳴隂晴雖不定天地自分明栁處風無力蛙時水有聲幾朝寒食近吾事及躬耕月泉吟社評曰前聮不束于題栁處蛙時一聫題意俱足格調甚髙結亦不浮山中懷友幾年音問絶此夕更關情寒雨人孤坐殘燈鴈一聲干戈猶故國貧病自空城惟有琴堪訴愁深彈不成清和白苧漸相便因知物候遷空山一雨後小檻緑隂前鶯在留春思人幽減晝眠此時風日好元不似梅天餘杭四月四月餘杭道一晴生意繁朱櫻青豆酒緑草白鵝村水滿船頭滑風輕袖影翻幾家蠶事動寂寂晝關門遊宜興張公洞天開福地據雄尊果老張公幾代孫一竅通天才直上千崖轉石已平吞山頭白鶴來無影石上青騾去有痕我欲放身如脫屣仙凡一轍隔重閽净慈禪寺奎額昭回龍屈盤入門已覺厭塵寰何當白髮三千丈來寄清風五百間帝子釜搖金㶑灎家人卦剔翠潺顔西湖日日船如織半在南屏第一山湖樓玩雪上湖十里捲簾中幻出瑶華一作臺第一宮山勢蹴天銀作浪栁行撲一作橫地玉為虹漁蓑鶴氅同為我一作伍爵舌羊羔不負公明日鳳池朝退蚤一鞭曾約試吟驄酒邊贈朱處士烏葛唐巾白苧裘掃庭終夕共淹留醉中談論心猶壯老去歌歡淚亦流對客呈詩如獻佛課兒收橘當封侯明年好理西風棹重約三吳爛漫遊遊天竺後山山轉龍泓一徑深嵐煙吹潤撲衣巾松蘿掩映似無路猿鳥往來如有人講石尚存天寶字御梅嘗識建炎春城中遮日空西望自與長安隔兩塵竹隂占斷人間瀟灑地全身水墨畫篔簹非煙非霧一林碧似雨似晴三徑涼翠袖佳人黯空谷白髭道士隱南塘數竿醉曰君須記移向西窗補夕陽題蘇東坡書楚頌並菩薩蠻滿庭芳詞卷後南荒九死幸生還種樹書成手自刪赤壁夢難同楚頌洞庭樂不減商山人生墮地少如意老子對天無愧顔千古莵裘有遺恨斷圭殘璧自人間續演雅十詩海青羽中虎燕燕能制之小隙沈一作乘大舟關尹不吾欺海青俊禽也而羣燕緣撲之即墜物受於所制者無小大也草食押不蘆雖死元不死未見滌腸人先聞棄簀子漠北有名押不蘆食其汁立死然以他藥解之即蘇華陀洗腸胃攻疾疑先服此誰令珠玉唾出彼藜藿腸仁人不為寶良賈宜深藏和林有尼能吐珠玉雜寶嬰啼聞木枝羝乳見茅茹何如百年身反爾無根據漠北種羊角能産羊其大如兔食之肥美嬰啼木枝見山海經所載西狩獲白麟至死意不吐代北有角端能通諸國語角端北地異獸也能人言其髙如浮圖才脫海鶴啄已登方物輿仰面勿啾啾我長非僑如小人長僅七寸夫婦二枚形體畢具羯尾大如斛堅車載不起此以不掉滅彼以不掉死西漠有羯尼大於身之半非車載尾不可行八珍殽龍鳳此出龍鳳外荔枝配江䖴徒誇有風味謂迤北八珍也所謂八珍則醍醐􅀢沆野駝蹄鹿唇駝乳糜天鵝炙紫玉漿𤣥玉漿也𤣥玉漿即馬妳子灤人薪巨松童山八百里世無奚超勇惆悵渡易水取松煤於灤陽即今上都去上都二百里即古松林千里其大十圍居人薪之將八百里也兩駝侍雪立終日饑不起一覺沙日黃肉屏那足擬沙漠雪盛命兩駝趺其旁終夜不動用斷梗架片氊其上而寢處於下暖勝肉屏且不起心兵也積雪峯訪梁道士劉大彬茅山志作積金峯驚羽穿林看細碎健輿繞石聽欹斜道人住近茅峯北一簇樓臺五色霞湖居雜興八首御舟初出賞春霏傳是諸王與后妃香霧漸深簾幕暗日斜微見淡黃衣脉脉吹香屋角梅背風移燭小簾開鳯城幾日元宵近一片簫聲水上來龍舟曉發斷橋西别有輕舟兩兩隨春色可人晴較穩酒家爭出栁梢旗相國平泉水竹居吳山一作中花石世間無遊人馬上休回首一半春風在裏湖雨後林塘夏亦秋一葫蘆酒在船頭醉來深入荷花去卧看青天飛白鷗三賢猶得仰髙風冠服雖殊氣味同後五百年無繼者桃花含笑夕陽中車魚人散水風腥雨色涼分栁外晴回首夕陽都落盡忽然東向數峯明萬樹芙蓉兩蘂宮秋風開遍水邊叢白墻遮盡紅墻出只見紅墻一半紅翔泳堂酒邊堂在西湖永夀寺環辭度得一作出雪兒歌濃墨斜書碧玉柯醉折芙蓉薰酒盞裏湖涼似外湖多題江貫道百牛圖幾年散放桃林後餘四百蹄猶可騎攬鏡一作境挂書多自在能騎惟有一凝之題龔翠巖中山出遊圖何處張弧鬼一車中山曾見夜搜圖紛紛眼底朱成碧後乘鍾家有此姝玉清宮與趙達夫鮮于樞聯句二首宮在西湖錦塢宋紹定初建湖光一作田漠漠水禽飛達夫堤栁斜斜帶夕暉樞二月江南好天氣珽初陽臺上愜春衣樞巾子峰頭艤釣船達夫初陽臺上坐鳴絃出雲髙樹明殘日珽過雨蒼苔泣細泉樞絶俗誰能繼髙一作遐躅凌雲一作虛我欲學飛仙達夫還家正恐鄉人問珽化鶴歸一作重來知幾年樞靈隱寺暮歸山色晚蒼蒼山門下夕陽栴林飄槲葉新月到禪牀徑出千峯秀亭回一澗長淹留不可及露濕薜衣裳宿上天竺名山倦游歷挂起手中藤佛國三生石天巖百嵗僧定回松院磬吟苦雪龕燈愧我心猶雜何因問二乘西湖訪古隱約湖一作湘山一㸃青秋風歸去阻雲程貝宮珠闕無尋處夜夜凌波哭月明山居懷林處士昔有一作在林處士結廬鄰峯巔年年不入城梅花有佳聯童鶴三數口負郭十畝田弟姪列朝裾咸平好時年人品既已髙奉養常充然嗟我何為者日用買山錢愛詩不能佳未了區中緣空有一寸心羡殺處士賢飽看貴人靣不若飢看天捶牀呼伯雅且此相周旋有田足幾時卓哉坡翁言題鄭子真畫四季詩意紅杏緑楊永晝野服柴門散仙莫道無人知處東風都在吟箋蓮葉吹香淡淡扁舟撑港斜斜驚散一行白鷺西風捲起梨花贈張知府周卿人品中原說此翁雄文直氣耿心胸幾年天上張公子今日雲間陸士龍來暮已聞歌五袴平反何翅祿千鍾相從愧落諸公後拭目西巖第一峯贈青龍任月山傾蓋相逢意已親風流儒雅邁同倫曾來東閣觀竒士又向西湖見偉人放棹小溪梅皪皪敲棋深院燭燐燐懸知後夜相懷切帆落胥山月一輪題洞霄宮藥圃仙翁曾播植瓊圃尚敷榮春日祥光滿秋風瑞實成黃精宜益夀萱草足忘情候採靈芝服還應羽翼生蛾眉亭秦赭鑿填石不受鞭箠考零落楚江滸相峙矗三島穿松得細徑據一陵二小奔流浩浩來五色爛華藻至寶地不惜絶境天所造誰言兩蛾黛功奪京兆巧終朝對顰蹙似為今古惱然犀磯沉沉跨鯨月皎皎絲綸三千丈蒙衝百萬櫂天風吹過夢多憂只空老今者吾與子所愜在幽討供帳莫匆匆槃觴從草草雅琴鼓一再領此風日好臨崖發清嘯倚樹或顛倒禮存玉帛外縱弛或一道興極不知歸白漚破晴昊李翰林墓出城得佳山兩峰特竒詭一如植躬圭一峰拱而侍我見猶愛之而况謫仙子孤墳在其下政爾直一死謫仙真仙人出處見諸史豈敢傲吾君辛苦植唐祀嗟豫侃侃者塵土正如此停車不忍發載拜顙有泚仰止青山髙清風與終始孰謂千載人不在天地裏題如鏡净講師房娛老林房世路賖塵埃飛不到袈裟西湖草木雖同土北寺煙霞自一家靜敞白閒翻貝葉閒輸赤仄養椒花鑑光炯炯輝今古身後何須用五車春日重過如鏡上人房憶昔敲門賦瑞筠鹿園佳話又重新屋頭能拓三三徑林下知非陸陸人鑿沼何須晉康樂種蓀還憶楚靈均老師鍊得心如鏡更把髙臺比月輪題惠山名山名剎大佳處紺殿翠宇開雲霞陸羽乃事已千載九龍諸峯元一家雨前茶有如此水月裏樹豈尋常花竒竒怪怪心語口無根柱杖任橫斜題碧桃折枝𤣥都千樹欲無枝全得春風爛漫吹曉露未晞紅郁郁仙源長在日遲遲弔林處士墓千古西湖見一賢斷碑猶在草芊芊人間豈少題梅者石上誰來酹菊泉陳柏墓門疑是宅唐衣廟貌望如仙可憐遼鶴無消息寂寞春風二百年擊蛇笏孔明廟前柏手版賊其枝枯秭無生氣衆目炫一時何如孔公笏鐵面含霜姿虺蛇何足道正氣屢奸欺祥符慶厯間豈無纖人斯聞之膽為落不在彼在兹聖學億萬年聖源浩無涯八傳得巨源憤學求似之遺經與遺物保護如嬰兒萬里去復逺見者咸齎咨况此一尺槐千載孔林思非無原壤杖非無少正鈹用舍各有時小大各有施疇能起假公共賦甘棠詩寄天香菴恬上人門掩天香竹樹叢了無塵翳此心同東林社散圖空在南國山多夢不通白草秋閒支遁馬黃沙春斷子卿鴻思君記得逢君處一片歸雲海樹空嶽武穆精忠廟國勢已如此孤忠天地知死生同父子姦宄繫安危偃月無封檜栖霞有諡碑中原遺老在嵗嵗夢王師三月八日過西馬塍散策好春日湖西古馬塍隂晴雖不定天地自分明栁處風無力蛙時水有聲園家分半席問得御花名按此首見成化杭州府志中二聯與田園雜興詩同過東寺倚空樓閣競翬飛鐵鳳金鈴一望齊多少流民無片瓦江南四月雨凄凄止征婦哭戰國曾聞挾兩戈病中軍不渡交河一身同為明庭死死敵强于死病多大易集說序易言吉凶悔吝進退存亡無非切已之用邇年以來談易者棼棼藉藉三人是之一人非之則攘袂瞋目而與之爭謙卦謂何三人非之一人是之則揚眉頓足而為之喜頤卦謂何嗚呼徒能言不能行易之道幾乎熄矣蘇臺俞玉吾樂貧安道華皓一節於易則不但能言之又能行之輯先儒諸名家之善為是書條列臚分醇正明白深有益於後學所居榜石澗學者稱石澗先生云皇慶元年春將仕郎江浙等處儒學副提舉白珽序淮雲寺化緣序佛廟之治有二補飭故物為二梵福崇建新製為三有利崇建之利三謂入海安穩多獲重寶欲作寺且不貪惜也噫凡天下事即以利而後有所為是名未離塵著雖然苟利一一切不間緇褐無論蒼雅皆宜有為但利已不利於人利寡不利於衆豈徒塵著猶之貪惜可也崑山太倉之陳涇前無寺自顧氏由淮而吳占地清曠而通上人與師正庭結茅而棲焉且曰吾里崇明有永寧而民日趨於善惜寺薄海隅濤齧風擊嵗虞欹墊欲遷善地而未能也我佛創四廟兩塔或伽邪山或祗陀園如白雲去來隨所止息無有方所若即此殊勝有所建推原其本顔曰淮雲鋭心善果日增月益克臻於有成不四三年紺樓翠宇翬飛金麗若就地涌出栴林嶷嶷法輪囷囷食有堂寢有竂行有廡衍膏腴以豐巾鉢闢崇深以繼薪水首踵寒暑之奉罔有或闕嗚呼今念慈教遍天下招提蘭若如恆河沙數豈繫有無於太倉一漚地哉徒以象教所至如日之無不照雲之無不覆使人觀感興起為善者衆於國家政教與有助焉為是緣果非了通其誰尚勉之哉至大庚戌正月既望述跋顔魯公劉中使真蹟又名瀛州帖瀛州帖視魯公他書特大而凛凛忠義之氣如對生面非石刻所能仿佛也余生平獲見真跡二小字麻姑記與此耳嘗有云桃源在何處乃見世道汙所以顔魯公細書記麻姑事近荒忽時賢者適嬰多虞世降俗卑陋假異境以明其志殆子欲居夷也雖魯公忠貫日月功載旗常固不待善書名于代况筆精墨妙若是耶昔桓彛渡江傷晉之弱及見王導輩語則知有托足之地余於是觀公剪禽之帖亦知夫唐爝未熄歟史侯處厚尚義士也曠嵗月而得之既得之非尚義者不出示處厚知所尚哉錢塘白珽題跋米海嶽臨唐𤣥宗書鶺鴒頌余生平見米氏真蹟將八九種皆晚年放縱之作其摹學古人者惟諸石搨中見之墨跡不多得邇來得見此帖然後知米氏之劍拔努張悉從小心翼翼中來也論者謂元章之書沈著痛快超妙入神不亞於唐𤣥宗當並肩齊驅耳何故摹之吁此以管窺天未知書之奧妙者也凡天下事最忌自滿器滿則盈舟滿則覆故狂夫之言聖人擇焉君子戒於闕黨也况右頌筆法結搆遒媚精神骨立不狃於世習得自然丰度亦有元章所不能到者今截長補短更覺神韻不凡耳所謂至寶必百鎔煉而後成者耶然元章摹書與他人異元章此帖與他帖異將來必有肯余論者錢唐白珽趙臨禇書跋禇公書􅒆六朝衆長而成一家於代何獨枯樹賦而已子昂後五百年一振豪頃奪其符而代之豈規規學禇而能之抑胸中有所謂􅒆者也謂豫不信有木居士在木齊王公孝感白華頌并序古孝親之感以致物之異多白故劉殷白雁林攢白烏程袁師白狼梁文貞白兔而詩之素冠白華可見矣若宇文周之王崇神草生庭以有德感無情登之信史傳以為祥不可誣也今木齊王史君孝母之徴著朱華白實於離根去土之瓶盎此又因心之效貫於神明者錢塘白珽謹拜手為之頌曰草木何知所知者天母也天只隔彼壤泉事死如生將終身焉酌水獻花罔或不䖍潔白之感著于几筵德有所屆在爾象賢守富守貴孝忠則全國人稱頌一作願憩棠樹萱斂華就實遺訓乃宣播此徽烈本支永年湛淵集
