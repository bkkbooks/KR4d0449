  text: 湛淵集附録
  hash: sha256:1ede2a99a782ccce5fe6e142ee2f4a7b7eb66c0e38fe9469c641008b314f8db3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0449_WYG_002-1a, image: WYG1198/WYG1198-0104c.png}
body:
  text: 元故湛淵先生白公墓銘宋濓嗚呼是惟湛淵先生白公之墓先生諱珽字廷玉白其姓也出於宋丞相時中之裔世居文水時中之從子翼扈蹕南渡官至防禦使生武略大夫良輔食邑檇李因家焉武略之後又至武功大夫顯始占籍於錢塘生修武郎必騰修武生通武郎嶸先生父也妣方氏先生本四明名儒舒少度遺腹子通武育以為嗣五歲能屬對八歲能賦詩十三受經太學習為科舉業轟然有聲場屋間一時貴人爭欲出其門下甫及壯元丞相巴延平江南聞先生賢檄為安豐丞辭不赴乃客授藏書之家晝翻夜誦燈墜花穴帽不知也如是者一十七年程文憲公巨夫劉中丞伯宣前後交薦之復以疾辭中歲嘗出遊梁鄭齊魯厯覽河山之勝登臨弔古訊人物風土慨然有尚友千載之意及至燕王公貴人見輒賔禮或欲舉為東宫官者先生復引義固辭南北孤逺士久困逆旅則必昌言甄拔之自是學益充文益富而家益貧宣尉都事鮮于公樞帥一時名士援杜甫邵堯夫故事共買屋使之居會李文簡公衎出將使指喟然歎曰有才如是坐視其窮可乎力挽起之授太平路儒學正先生不得己應命未幾攝行教授事悉心官政修建天門采石二書院政成當時事例可貢行臺令史逹官勸之行先生笑曰吾守章縫爾它何覬哉尋轉常州路儒學教授兵燹之後禮殿與堂廡皆廢弗治祭器載籍亦闕先先為完之且復侵疆三千餘畝俄再遷教授慶元未上翰林集賢兩院謀曰白先生淹回下列吾儕不啓齒一言可謂汗顔矣共尉薦之升江浙等處儒學提舉司副提舉階將仕佐郎時鄧文肅公文原實為之長與先生志氣吻合舉刺得宜文化大行秩既滿銓曹有不知先生者署淮東鹽倉大使先生自以鹽策非所諳習不俟終更即謝事養疴海陵逺近學徒擔簦相從者殆無虛月先生已六十又七及再遷從事郎婺州路蘭溪州判官則不復有宦情矣日與韻朋勝友曳杖遊衍銜杯賦詩惟恐日之易夕所居西湖有泉自天竺來及門而滙榜之曰湛淵因以自號晚歸老栖霞又號栖霞山人以天厯元年九月十五日卒年八十一其年十一月二日葬錢塘縣履泰鄉栖霞山之陽其子遵治命題曰西湖詩人白君之墓云先生性至孝母病刲股和藥起瀕死者再及殁號慟自擲嘔血至數升父感奇疾醫言必得兔屎可療先生踏氷雪緣崖穴求之三日不得父死抱尸哭絶而復蘇繼母虐不子厥子先生事之愈恭既而改適他氏無儋石之儲先生為營朝夕且負其避兵迄免於難然汲汲行義尤不顧家之窶孤嫠不能昏者嫁之死而無所歸者藁殯之道中拾遺珠待其人訪索審而還之或以質劑假金匱乏不獲償焚而慰之生平無驕辭怠色一以謙抑為事聞人善未嘗不艷慕見揚人過掩身亟避去奉先之外不惑異端不諂瀆鬼神疾疢憂患之來一委之于天自幼至老無一日廢問學故能長於詩文紫陽方公回稱其冠絶古今有英雄大丈夫氣剡源戴公表元謂其注波五經之淵披條百氏之畹廬陵劉公辰翁又言其不為雕刻苛碎蒼然者不惟極塵外之趣兼有雲山韶護之音皆確論也翰墨雖其餘事亦有晉魏風酒酣命二童持紙懸筆一揮疾如雨風聲光翕然四達而先生素志邱壑以退為進故位不逮名君子惜之先生娶沈氏有賢行前二十七年卒子二賁文林郎南安路總管府經厯采溫州路永嘉縣鎮海東寨巡檢女一歸常州路儒學正鄭禾孫四栩越東明皆蚤世孫女一適平陽宋允恆允恆由紹慶路儒學正升授新州新興縣福緣寨巡檢賁以子夭命允恆仲子範為後範有學而文能繼其家者也範生子二弦韜女三先生所著書曰詩曰文曰經子類訓曰集翠裘曰靜語皆二十卷嘗鋟諸梓四方多傳誦嗚呼先生已矣濓生也晚雖不能識先生幸從鄉先生黃文獻公遊聽談杭都舊事有如淮隂龔公開嚴陵何公夢桂眉山家公之巽莆田劉公護西秦張公楧虎林仇公逺齊東周公密凡十餘人相與倡明雅道而先生齒為最少乃與羣公相頡頑南北兩山間其遺迹班班故在僅踰五十春秋而先輩流風遺韻弗可復見不亦悲夫嗚呼死者固不可作若并其言行而不彰將何以為聳善扶俗之勸於是徇範之請巨細畢書之嗚呼先生之名其果待文而後傳哉銘曰虎林有哲夫兮秉德良優柔嗜義如嗜利兮避名如避讐指退以為進兮謙抑每自修知分中自定兮不假外物求天經況所惇兮血淚交頥流冠冕百行先兮倫品庶不偷發越見聲詩兮笙鏞間鳴球律品素和協兮八音交相繆雄章落四海兮虹氣日夜浮棲霞有名山兮草木光如油紀德薦石章兮千古振諸幽
