body:
  text: 湛淵集别集類四元提要臣等謹案湛淵集一卷元白珽撰珽字廷玊錢塘人以李衎薦授太平路儒學正官至蘭溪州判官致仕結廬西湖之金沙灘榜之曰湛淵因以自號晚復自號棲霞山人成化杭州府志載珽湛淵集八卷文淵閣書目尚著録今已久佚此本為近時杭州沈嵩町所輯凡賦二首詩六十三首文六首冠以戴表元序而附以宋濂所作墓志表元序稱其詩甚似渡江陳去非濂志載劉辰翁之言稱其不為雕刻苛碎有雲山韶護之音又月泉吟社第十八名唐楚友者即珽之寓名謝翺方鳳等亦評其格調甚髙陶九成撰輟耕録載其演雅十首蓋珽在宋咸淳中已與仇逺同以詩名入元後二人皆應薦為儒官坎坷不達退老湖山出處亦略相近其集皆散佚之後經後人重輯略存什一而逺所撰金淵集以永樂大典全部收入恭逢聖代右文獲邀睿鑒重得刋行而珽集以永樂大典未收無從裒録故所傳祗有此本其中又間雜僞作如成化杭州府志所載三月八日過西馬塍一首中四句全與月泉吟社詩同而第二句以塍字與晴聲名字同押是于至正之初已用洪武正韻其為依託淆混不問可知是則與逺所遭有幸有不幸矣然吉光片羽終足寶貴固不妨與逺並傳也乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀湛淵集序日余得白廷玉姓字於周義烏往還書中其賦銅浮漚一篇尤清馴可念自是欲識廷玉逢人輒問之而廷玉授書北關數里外栖栖然窮書生耳時節一入城不能與故人從容立談而去則余無自而接廷玉焉一日儼褒博之衣忽來顧余逆旅中辭傾意酣慨然有古人班荆之喜傾蓋之誠又出其自寫詩數十百篇贈余以其有以自重也愈益念之昔者杭為行都士非欲售其業者不至杭詩雖非干世之業而自山林攻詩者一涉足於杭而遷焉若杭人之所自為詩則遷愈甚何也纍於知也今夫士大夫之居游於杭者皆無前時之心而余之得廷玉與廷玉之得於余豈不亦有可言者哉廷玉詩甚似渡江陳去非而嘗諱言去非又特好記覽每一篇必欲令注波於六經之淵披條于百氏之畹誠放此不止余何云以得廷玉哉剡源戴表元帥初父撰
